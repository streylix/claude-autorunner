# Brings up the Django backend (port 8123) + Postgres.
#   docker compose up -d --wait
# The Electron app talks to the backend over HTTP/WS; it never runs docker itself.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ccbot}
      POSTGRES_USER: ${POSTGRES_USER:-ccbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccbot}
    volumes:
      - ccbot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccbot -d ccbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Bind to loopback only. The Electron app + manager reach the backend via
      # localhost on the host; binding 127.0.0.1 removes LAN exposure (the host
      # bind is the only effective network boundary here — docker's userland
      # proxy masquerades all host/LAN traffic to the same gateway IP inside the
      # container, so an in-container IP filter cannot distinguish the two).
      - "127.0.0.1:8123:8123"
    environment:
      # Discrete PG vars consumed by terminal_backend/settings.py.
      POSTGRES_DB: ${POSTGRES_DB:-ccbot}
      POSTGRES_USER: ${POSTGRES_USER:-ccbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccbot}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SETTINGS_MODULE: terminal_backend.settings
      # Production hardening (from .env; see .env.example). DEBUG defaults to
      # false so a missing .env still runs locked-down. SECRET_KEY must be set
      # in .env when DEBUG=false or settings.py raises at startup.
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-}
      # Optional API auth; unset = current loopback-only/no-token behavior.
      CCBOT_API_TOKEN: ${CCBOT_API_TOKEN:-}
      # Expose the host NVIDIA GPU to this container (host already runs the nvidia
      # container runtime). Lets the CUDA torch build see the RTX 3090 for Kokoro
      # TTS / Whisper; harmless on hosts without a GPU.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # CPU Vosk wake-word model for /api/voice/wake-check/ (mounted read-only
      # below). Lets the bridge gate on the wake word without the GPU Whisper.
      VOSK_MODEL_PATH: /models/vosk-model-small-en-us.tar.gz
    volumes:
      # Reuse the desktop app's shipped Vosk model — no duplicate download, and
      # the model stays out of the image (build context is ./backend).
      - ./assets/models:/models:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # /api/queue/health/ is the lightweight JSON health endpoint
      # (mounted at api/queue/ -> message_queue.urls -> health/).
      test: ["CMD-SHELL", "curl -fsS http://localhost:8123/api/queue/health/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  ccbot-pgdata:
